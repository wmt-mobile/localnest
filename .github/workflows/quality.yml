name: Quality

on:
  pull_request:
    paths-ignore:
      - 'localnest-docs/**'
      - 'readme/**'
      - '**/*.md'
      - '.github/workflows/docs.yml'
  push:
    branches:
      - main
      - 'release/**'
    paths-ignore:
      - 'localnest-docs/**'
      - 'readme/**'
      - '**/*.md'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Install ML dependencies for tests
        run: node scripts/runtime/install-localnest-skill.mjs --quiet 2>/dev/null || true

      - name: Test with coverage
        run: npm run test:coverage

      - name: Check circular deps
        run: npm run quality:cycles

      - name: Check unused deps
        run: npm run quality:deps

      - name: Package quality
        run: npm run quality:package

      - name: Audit quality
        run: npm run quality:audit
