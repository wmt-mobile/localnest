name: Bug Report
description: Report a bug or unexpected behavior in LocalNest
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please run `localnest doctor --verbose` and paste the output below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: Clear and concise description of what the bug is.
      placeholder: When I run `localnest memory add`, it fails with...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal commands to reproduce the issue
      placeholder: |
        1. Run `localnest setup`
        2. Run `localnest memory add --title "test"`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Run `localnest doctor --verbose` and paste the full output here
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: LocalNest version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.16.0 (run `node --version`)"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows
        - WSL
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: AI client (if applicable)
      multiple: true
      options:
        - Claude Code
        - Cursor
        - Windsurf
        - Cline
        - Continue
        - Other
        - N/A (CLI only)

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or stack traces
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate
          required: true
        - label: I have run `localnest doctor` and included the output
          required: true
