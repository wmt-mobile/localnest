interface:
  display_name: "LocalNest MCP"
  short_description: "Install and use LocalNest MCP tools for local repo retrieval"
  default_prompt: "Use LocalNest MCP by intent: search_files for module discovery, search_code for exact strings, search_hybrid for concept lookup, and read_file for confirmation. If memory is enabled and the task is non-trivial, prefer task_context before deeper analysis. After any meaningful fix, decision, review finding, reusable workflow discovery, or user preference discovery, prefer capture_outcome with a durable summary and file links. Fall back to memory_recall or memory_capture_event only when lower-level control is needed."
